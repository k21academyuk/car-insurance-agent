version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoshield-postgres
    environment:
      POSTGRES_USER: autoshield
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: autoshield
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoshield"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: autoshield-redis
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.18
    container_name: autoshield-chromadb
    ports: ["8001:8000"]
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  backend:
    build: ../../backend
    container_name: autoshield-backend
    env_file: ../../backend/.env
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      chromadb: { condition: service_started }
    volumes:
      - ../../backend:/app
      - ml_artifacts:/app/app/ml_models/artifacts
    restart: unless-stopped

  frontend:
    build: ../../frontend
    container_name: autoshield-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: autoshield-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: autoshield-grafana
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  ml_artifacts:
  prometheus_data:
  grafana_data:
