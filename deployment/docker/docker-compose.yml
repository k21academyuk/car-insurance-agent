services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: car-insurance-agent
    env_file: ../../backend/.env
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  chroma_data:
